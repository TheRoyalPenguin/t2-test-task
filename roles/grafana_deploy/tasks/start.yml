---
- name: Start container via docker compose
  command: docker compose up -d
  args:
    chdir: "{{ grafana_data_dir }}"

- name: Healthcheck - wait for Grafana API to be ready
  uri:
    url: "http://localhost:{{ grafana_http_port }}/api/health"
    status_code: 200
  register: _result
  until: _result.status == 200
  retries: 12
  delay: 5
